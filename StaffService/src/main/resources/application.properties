spring.application.name=StaffService

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.url=jdbc:mysql://localhost:3306/hospitalManagementSystem

spring.datasource.username=root

spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

server.port=9002


eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

eureka.instance.instance-id=${spring.application.name}:${spring.instance.instance_id:${random.value}}

jwt.secret=ChangeThisSecretKeyForJwtGeneration1234567890
jwt.expiration-ms=3600000

# Enable Feign logging
logging.level.com.flmhospitals.feignclient=DEBUG
feign.client.config.default.loggerLevel=FULL
