spring.application.name=AppointmentManagement

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.url=jdbc:mysql://localhost:3306/hospitalManagementSystem

spring.datasource.username=root


spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

server.port=8081

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureks.client.service-url.defaultZone=http://localhost:8761/eureka/

eureka.instance.instance-id=${spring.application.name}:${spring.instance.instance_id:${random.value}}

